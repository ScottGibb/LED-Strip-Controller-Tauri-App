name: Update Nix files after Dependabot

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main

jobs:
  update-nix:
    if: startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}
          ref: ${{ github.head_ref }}
          # IMPORTANT: Fetch 2 commits so we can compare HEAD to HEAD^
          fetch-depth: 2

      - name: Check for relevant file changes
        id: filter
        run: |
          # Use diff instead of diff-tree for better shallow clone compatibility
          if git diff --name-only HEAD^ HEAD | grep -Eq '^(bun\.lock|package\.json|bun\.nix)$'; then
            echo "relevant_changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected changes in: $(git diff --name-only HEAD^ HEAD | grep -E '^(bun\.lock|package\.json|bun\.nix)$')"
          else
            echo "relevant_changed=false" >> "$GITHUB_OUTPUT"
            echo "No relevant changes found in this commit."
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.filter.outputs.relevant_changed == 'true'
        with:
          bun-version: latest

      - name: Install and Postinstall
        if: steps.filter.outputs.relevant_changed == 'true'
        run: |
          bun install
          bun run postinstall

      - name: Commit and Push bun.nix
        if: steps.filter.outputs.relevant_changed == 'true'
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add bun.nix

          if ! git diff --staged --quiet; then
            git commit -m "chore: update bun.nix after dependency changes"
            git push origin "HEAD:${PR_HEAD_REF}"
          else
            echo "No changes to bun.nix detected after install."
          fi
      - name: Final Status
        run: echo "Workflow finished. Check is now green."
