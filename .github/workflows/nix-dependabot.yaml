name: Update Nix files after Dependabot

permissions:
  contents: write

on:
  pull_request:
    paths:
      - "package.json"
      - "bun.lock"
    branches:
      - "main"

jobs:
  update-nix:
    if: startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Use your PAT here so the push triggers CI
          token: ${{ secrets.PAT }}
          ref: ${{ github.head_ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run postinstall
        run: bun run postinstall

      - name: Commit bun.nix changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add bun.nix

          # Only commit/push if there are actual changes
          if ! git diff --staged --quiet; then
            git commit -m "chore: update bun.nix after dependency changes"
            # Push directly to the PR branch
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "No changes to bun.nix"
          fi
